<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>محاسبه سن دقیق</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      direction: rtl;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 320px;
    }

    h2 {
      margin-bottom: 15px;
    }

    input {
      padding: 10px;
      width: 100%;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #45a049;
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>محاسبه سن دقیق</h2>

    <input type="date" id="birthdate">

    <button onclick="calcAge()">محاسبه سن</button>

    <div id="result"></div>
  </div>

  <script>
    function calcAge() {
      let birthValue = document.getElementById("birthdate").value;
      let result = document.getElementById("result");

      if (!birthValue) {
        result.innerText = "لطفاً تاریخ تولد را وارد کنید";
        result.style.color = "red";
        return;
      }

      let birth = new Date(birthValue);
      let today = new Date();

      let age = today.getFullYear() - birth.getFullYear();
      let m = today.getMonth() - birth.getMonth();

      if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) {
        age--;
      }

      result.style.color = "black";
      result.innerText = "سن شما: " + age + " سال";
    }
  </script>

</body>
</html>
